<html lang="ar" dir="rtl" data-mode="dark" data-color="teal"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="">
<!-- ✏ ANPASSEN: Browser-Tab-Titel -->
<title></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=JetBrains+Mono:wght@300;400;500&amp;family=Noto+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════════════════
   §CSS-1  DESIGN TOKENS  —  Alles hier zentral anpassen
   ════════════════════════════════════════════════════════════════════ */
:root {
  /* Hintergründe */
  --bg:           #050810;
  --bg-nav:       rgba(5,8,16,.82);
  --bg-glass:     rgba(10,14,30,.68);

  /* Text */
  --text:         #F0EDE8;
  --muted:        #7a7f99;
  --subtle:       #2a2e45;

  /* Akzent  ← wird durch [data-color] überschrieben */
  --accent:       #16a085;
  --accent-rgb:   22,160,133;
  --accent-dim:   rgba(22,160,133,.09);
  --accent-bdr:   rgba(22,160,133,.30);
  --bdr-hover:    rgba(22,160,133,.46);

  /* Borders */
  --bdr:          rgba(255,255,255,.08);

  /* Glow */
  --glow-sm: 0 0 12px rgba(22,160,133,.32);
  --glow-md: 0 0 22px rgba(22,160,133,.40), 0 0 65px rgba(22,160,133,.14);
  --glow-lg: 0 0 40px rgba(22,160,133,.50), 0 0 110px rgba(22,160,133,.16);

  /* Yin-Yang — immer Schwarz/Cremeweiß, unabhängig vom Theme */
  --yy-dark:  #06090F;
  --yy-light: #F4F0EB;

  /* Hintergrund-Orbs */
  --orb1: rgba(22,160,133,.13);
  --orb2: rgba(60,120,255,.10);
  --orb3: rgba(180,40,255,.08);

  /* Schriften */
  --fd: 'Syne','Noto Sans Arabic',sans-serif;
  --fm: 'JetBrains Mono','Noto Sans Arabic',monospace;

  /* Animationszeiten  ✏ ANPASSEN */
  --dur-yy:    18s;   /* Yin-Yang eine volle Drehung          */
  --dur-orbit: 10s;   /* Umlaufbahn                           */
  --dur-mode:  1.4s;  /* Dark/Light-Übergang                  */
  --dur-orb1:  22s;
  --dur-orb2:  18s;
  --dur-orb3:  28s;

  /* Maße  ✏ ANPASSEN */
  --yy-size:   310px; /* Yin-Yang Durchmesser                 */
  --nav-h:      60px;
  --card-r:     14px;
  --blur:       18px;
}

/* ── Farb-Themes ────────────────────────────────────────────────── */
:root[data-color="teal"] {
  --accent:#16a085;--accent-rgb:22,160,133;
  --accent-dim:rgba(22,160,133,.09);--accent-bdr:rgba(22,160,133,.30);--bdr-hover:rgba(22,160,133,.46);
  --glow-sm:0 0 12px rgba(22,160,133,.32);--glow-md:0 0 22px rgba(22,160,133,.40),0 0 65px rgba(22,160,133,.14);--glow-lg:0 0 40px rgba(22,160,133,.50),0 0 110px rgba(22,160,133,.16);
  --orb1:rgba(22,160,133,.13);--orb2:rgba(0,90,130,.12);--orb3:rgba(20,180,140,.08);
}
:root[data-color="sage"] {
  --accent:#8F9790;--accent-rgb:143,151,144;
  --accent-dim:rgba(143,151,144,.09);--accent-bdr:rgba(143,151,144,.30);--bdr-hover:rgba(143,151,144,.46);
  --glow-sm:0 0 12px rgba(143,151,144,.30);--glow-md:0 0 22px rgba(143,151,144,.40),0 0 65px rgba(143,151,144,.14);--glow-lg:0 0 40px rgba(143,151,144,.48),0 0 110px rgba(143,151,144,.14);
  --orb1:rgba(143,151,144,.12);--orb2:rgba(80,100,90,.12);--orb3:rgba(160,180,165,.07);
}
:root[data-color="mint"] {
  --accent:#00E5A0;--accent-rgb:0,229,160;
  --accent-dim:rgba(0,229,160,.08);--accent-bdr:rgba(0,229,160,.30);--bdr-hover:rgba(0,229,160,.46);
  --glow-sm:0 0 12px rgba(0,229,160,.32);--glow-md:0 0 22px rgba(0,229,160,.42),0 0 65px rgba(0,229,160,.15);--glow-lg:0 0 40px rgba(0,229,160,.50),0 0 110px rgba(0,229,160,.16);
  --orb1:rgba(0,229,160,.12);--orb2:rgba(60,120,255,.10);--orb3:rgba(0,180,130,.08);
}
:root[data-color="cosmic"] {
  --accent:#60A5FA;--accent-rgb:96,165,250;
  --accent-dim:rgba(96,165,250,.08);--accent-bdr:rgba(96,165,250,.30);--bdr-hover:rgba(96,165,250,.46);
  --glow-sm:0 0 12px rgba(96,165,250,.32);--glow-md:0 0 22px rgba(96,165,250,.42),0 0 65px rgba(96,165,250,.15);--glow-lg:0 0 40px rgba(96,165,250,.50),0 0 110px rgba(96,165,250,.16);
  --orb1:rgba(96,165,250,.12);--orb2:rgba(30,60,180,.14);--orb3:rgba(140,80,255,.08);
}
:root[data-color="neon"] {
  --accent:#A855F7;--accent-rgb:168,85,247;
  --accent-dim:rgba(168,85,247,.08);--accent-bdr:rgba(168,85,247,.30);--bdr-hover:rgba(168,85,247,.46);
  --glow-sm:0 0 12px rgba(168,85,247,.34);--glow-md:0 0 22px rgba(168,85,247,.45),0 0 65px rgba(168,85,247,.18);--glow-lg:0 0 40px rgba(168,85,247,.52),0 0 110px rgba(168,85,247,.20);
  --orb1:rgba(168,85,247,.12);--orb2:rgba(80,0,180,.14);--orb3:rgba(220,60,255,.08);
}

/* ── Light Mode: system ─────────────────────────────────────────── */
@media (prefers-color-scheme:light) {
  :root[data-mode="auto"] {
    --bg:#EDF1F7;--bg-nav:rgba(237,241,247,.88);--bg-glass:rgba(255,255,255,.76);
    --text:#08101E;--muted:#4a506b;--subtle:#b8c0d4;--bdr:rgba(0,0,0,.08);
    --orb1:rgba(22,160,133,.08);--orb2:rgba(60,120,255,.06);--orb3:rgba(180,40,255,.05);
  }
}
/* ── Light Mode: manuell ────────────────────────────────────────── */
:root[data-mode="light"] {
  --bg:#EDF1F7;--bg-nav:rgba(237,241,247,.88);--bg-glass:rgba(255,255,255,.76);
  --text:#08101E;--muted:#4a506b;--subtle:#b8c0d4;--bdr:rgba(0,0,0,.08);
  --orb1:rgba(22,160,133,.08);--orb2:rgba(60,120,255,.06);--orb3:rgba(180,40,255,.05);
}

/* ════════════════════════════════════════════════════════════════════
   §CSS-2  RESET & BASE
   ════════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--fm);
  font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;cursor:none;
  transition:background var(--dur-mode) cubic-bezier(.4,0,.2,1),
             color calc(var(--dur-mode)*.7) ease;
}
html[lang="ar"] body        {font-family:'Noto Sans Arabic',sans-serif}
html[lang="ar"] .hero-title {font-family:'Noto Sans Arabic',sans-serif;letter-spacing:0;line-height:1.2;font-size:clamp(2.2rem,6vw,5.5rem)}

/* ════════════════════════════════════════════════════════════════════
   §CSS-3  CANVAS / ORBS / CURSOR / PROGRESS
   ════════════════════════════════════════════════════════════════════ */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

.orb{position:fixed;border-radius:50%;filter:blur(88px);pointer-events:none;z-index:1;animation:orbFloat linear infinite;transition:background var(--dur-mode) ease}
.orb-1{width:650px;height:650px;background:var(--orb1);top:-180px;right:-220px;animation-duration:var(--dur-orb1)}
.orb-2{width:520px;height:520px;background:var(--orb2);bottom:-130px;left:-200px;animation-duration:var(--dur-orb2);animation-delay:-8s}
.orb-3{width:380px;height:380px;background:var(--orb3);top:40%;left:40%;animation-duration:var(--dur-orb3);animation-delay:-14s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(32px,-48px) scale(1.05)}66%{transform:translate(-22px,30px) scale(.96)}100%{transform:translate(0,0) scale(1)}}

.cursor-dot{
  width:10px;height:10px;background:var(--accent);border-radius:50%;
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px rgba(var(--accent-rgb),1),0 0 28px rgba(var(--accent-rgb),.65),0 0 55px rgba(var(--accent-rgb),.3);
  transition:width .12s,height .12s,background var(--dur-mode) ease,box-shadow var(--dur-mode) ease;
  mix-blend-mode:screen;
}
.cursor-ring{
  width:40px;height:40px;
  border:2px solid rgba(var(--accent-rgb),.72);
  border-radius:50%;position:fixed;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(var(--accent-rgb),.28),inset 0 0 12px rgba(var(--accent-rgb),.10);
  transition:width .28s cubic-bezier(.2,1,.4,1),height .28s cubic-bezier(.2,1,.4,1),border-color .28s,box-shadow .28s;
}
.cursor-trail{
  width:5px;height:5px;border-radius:50%;background:var(--accent);
  position:fixed;pointer-events:none;z-index:9996;
  transform:translate(-50%,-50%);
  transition:background var(--dur-mode) ease;
}
.cursor-ripple{
  position:fixed;border-radius:50%;pointer-events:none;z-index:9995;
  border:2px solid rgba(var(--accent-rgb),.7);
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .55s ease-out forwards;
}
@keyframes rippleOut{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}
}

#scroll-prog{position:fixed;top:0;left:0;height:2px;background:var(--accent);width:0%;z-index:999;box-shadow:var(--glow-sm);transition:width .1s linear}

/* ════════════════════════════════════════════════════════════════════
   §CSS-4  NAVIGATION
   ════════════════════════════════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);
  padding:0 2.5rem;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bdr);background:var(--bg-nav);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:background var(--dur-mode) ease,border-color var(--dur-mode) ease;
}
.nav-logo{font-family:var(--fd);font-size:.96rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:.04em;transition:color var(--dur-mode) ease}
.nav-logo span{color:var(--accent);text-shadow:var(--glow-sm)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:color .22s}
.nav-links a:hover{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:.7rem}

/* Farbpunkte */
.theme-sw{display:flex;gap:.42rem;align-items:center}
.th-dot{width:17px;height:17px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .22s,border-color .22s;position:relative}
.th-dot:hover,.th-dot.active{transform:scale(1.28);border-color:var(--text)}
.th-dot.active::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(255,255,255,.25)}

/* Sprache */
.lang-sw{display:flex;border:1px solid var(--bdr);border-radius:7px;overflow:hidden;background:rgba(255,255,255,.03);transition:border-color var(--dur-mode) ease}
.lang-btn{background:transparent;border:none;cursor:pointer;padding:5px 11px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);transition:background .15s,color .15s}
.lang-btn+.lang-btn{border-left:1px solid var(--bdr)}
.lang-btn.active{background:var(--accent-dim);color:var(--accent)}
.lang-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.05)}

/* Mode-Toggle */
.mode-btn{background:rgba(255,255,255,.04);border:1px solid var(--bdr);color:var(--muted);cursor:pointer;width:34px;height:28px;border-radius:7px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:border-color .22s,color .22s,box-shadow .22s}
.mode-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow-sm)}

/* ════════════════════════════════════════════════════════════════════
   §CSS-5  HERO
   ════════════════════════════════════════════════════════════════════ */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 2.5rem calc(var(--nav-h) + 5rem);position:relative;overflow:hidden}

/* Parallax-Gitter */
.pl-grid{
  position:absolute;inset:0;pointer-events:none;will-change:transform;z-index:1;
  background-image:linear-gradient(rgba(255,255,255,.024) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.024) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse at 72% 50%,black 0%,transparent 65%);
  -webkit-mask-image:radial-gradient(ellipse at 72% 50%,black 0%,transparent 65%);
  transition:opacity var(--dur-mode) ease;
}
html[dir="rtl"] .pl-grid{mask-image:radial-gradient(ellipse at 28% 50%,black 0%,transparent 65%);-webkit-mask-image:radial-gradient(ellipse at 28% 50%,black 0%,transparent 65%)}
:root[data-mode="light"] .pl-grid{background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px)}
@media(prefers-color-scheme:light){:root[data-mode="auto"] .pl-grid{background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px)}}

/* Hero-Texte */
.hero-tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);text-shadow:var(--glow-sm);margin-bottom:1.5rem;opacity:0;animation:fadeUp .7s .2s forwards;position:relative;z-index:5}
.hero-title{font-family:var(--fd);font-size:clamp(2.8rem,7vw,6.5rem);font-weight:800;line-height:.93;letter-spacing:-.03em;color:var(--text);margin-bottom:2rem;opacity:0;animation:fadeUp .7s .4s forwards;position:relative;z-index:5;transition:color var(--dur-mode) ease}
.hero-title .dim   {color:var(--subtle);transition:color var(--dur-mode) ease}
.hero-title .hi    {color:var(--accent);text-shadow:var(--glow-md)}
.hero-desc{max-width:520px;color:var(--muted);line-height:1.85;margin-bottom:2.8rem;opacity:0;animation:fadeUp .7s .6s forwards;position:relative;z-index:5;transition:color var(--dur-mode) ease}
.hero-cta{display:inline-flex;align-items:center;gap:.8rem;color:var(--accent);text-decoration:none;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding-bottom:3px;border-bottom:1px solid var(--accent);text-shadow:var(--glow-sm);opacity:0;animation:fadeUp .7s .8s forwards;transition:gap .25s;position:relative;z-index:5}
.hero-cta:hover{gap:1.3rem}
.scroll-hint{position:absolute;bottom:2.5rem;writing-mode:vertical-rl;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--subtle);opacity:0;animation:fadeIn 1s 1.8s forwards;z-index:5;transition:color var(--dur-mode) ease}
html[dir="ltr"] .scroll-hint{right:2.5rem}
html[dir="rtl"] .scroll-hint{left:2.5rem;right:auto}

/* ════════════════════════════════════════════════════════════════════
   §CSS-6  YIN-YANG COMPONENT
   ════════════════════════════════════════════════════════════════════
   Aufbau:
     .yy-anchor    = fester Referenzpunkt im Hero (rechts, 50% Höhe)
       .yy-arm     = bewegt sich auf Ellipsenbahn (transform via JS)
         .yy-wrap  = Glow-Filter + Fade-In
           #yySvg  = SVG-Symbol, vollständig via JS animiert

   YIN-YANG SVG-GEOMETRIE (viewBox 0 0 310 310, Mittelpunkt 155,155):
     Außenradius        R = 148
     Kleine Kreise      r = 74  (= R/2)
     Punkt-Radius       d = 27  (= R/5.5)

   PFADE (alle Koordinaten relativ zu Mittelpunkt via <g translate>):
     Dunkel (Yin):
       M0,-148  → CW kleiner Bogen  biegt RECHTS → (0,0)
                → CCW kleiner Bogen biegt LINKS  → (0,148)
                → CW großer Bogen   linke Seite  → (0,-148)

   PUNKTE — geometrisch verifiziert mit Ray-Casting:
     Heller Punkt  cy=-74 → in dunkler Hälfte ✓
     Dunkler Punkt cy=+74 → in heller  Hälfte ✓  (das ist der gesuchte "dunkle Punkt im Weißen")

   ANIMATION (JS §JS-5):
     Drehung im Uhrzeigersinn → dunkler Punkt bei 270° bewegt sich NACH OBEN
                              → heller  Punkt bei  90° bewegt sich NACH UNTEN
   ════════════════════════════════════════════════════════════════════ */
.yy-anchor{position:absolute;right:8%;top:50%;width:0;height:0;pointer-events:none;z-index:3}
html[dir="rtl"] .yy-anchor{right:auto;left:8%}

.yy-arm{
  position:absolute;
  left:calc(var(--yy-size) / -2);
  top:calc(var(--yy-size)  / -2);
}

.yy-wrap{
  width:var(--yy-size);height:var(--yy-size);
  opacity:0;animation:fadeIn 1.2s 1s forwards;position:relative;
  filter:drop-shadow(0 0 30px rgba(var(--accent-rgb),.28)) drop-shadow(0 0 72px rgba(var(--accent-rgb),.12));
  transition:filter var(--dur-mode) ease;
}

/* Dekorative Orbit-Ringe */
.yy-ring-a,.yy-ring-b{position:absolute;border-radius:50%;pointer-events:none}
.yy-ring-a{inset:-14px;border:1px solid rgba(var(--accent-rgb),.16);animation:ringPulse 3.5s ease-in-out infinite}
.yy-ring-b{inset:-28px;border:1px dashed rgba(var(--accent-rgb),.07);animation:ringPulse 5.5s ease-in-out infinite reverse}

/* SVG — Animation komplett via JS */
#yySvg{
  width:100%;height:100%;overflow:visible;
  animation:yyFallback var(--dur-yy) linear infinite; /* CSS-Fallback ohne JS */
  will-change:transform;
}
#yySvg.js{animation:none} /* JS übernimmt */

/* Schwebende Partikel um das Yin-Yang */
.yy-p{
  position:absolute;border-radius:50%;background:var(--text);pointer-events:none;
  animation:pOrbit linear infinite;transition:background var(--dur-mode) ease;
}
@keyframes pOrbit{
  from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg);opacity:.55}
  50%{opacity:.22}
  to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg);opacity:.55}
}

/* ════════════════════════════════════════════════════════════════════
   §CSS-7  PROJEKTE — Glassmorphism
   ════════════════════════════════════════════════════════════════════ */
.proj-section{padding:8rem 2.5rem;max-width:1280px;margin:0 auto;position:relative;z-index:10}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4rem;gap:1.5rem}
.section-label{display:flex;align-items:center;gap:1rem;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--subtle);flex:1;transition:color var(--dur-mode) ease}
.section-label::after{content:'';flex:1;height:1px;background:var(--bdr);transition:background var(--dur-mode) ease}

.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}

.proj-card{
  background:var(--bg-glass);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border:1px solid var(--bdr);border-radius:var(--card-r);padding:2.25rem;
  transition:border-color .35s,transform .35s,box-shadow .35s,background var(--dur-mode) ease;
  position:relative;overflow:hidden;display:block;height:100%;text-decoration:none;
}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),.48),transparent);opacity:0;transition:opacity .35s}
.proj-card::after{content:'';position:absolute;inset:0;border-radius:var(--card-r);background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(var(--accent-rgb),.07) 0%,transparent 60%);opacity:0;transition:opacity .35s;pointer-events:none}
.proj-card:hover{border-color:var(--bdr-hover);transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.45),var(--glow-md)}
.proj-card:hover::before{opacity:1}
.proj-card:hover::after{opacity:1}
.proj-card.featured{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;padding:3rem;border-radius:18px}

.proj-num{font-size:10px;letter-spacing:.18em;color:var(--subtle);margin-bottom:1.75rem;transition:color var(--dur-mode) ease}
.proj-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.1rem}
.tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.18);padding:2px 9px;border-radius:4px;transition:box-shadow .22s,background var(--dur-mode) ease}
.proj-card:hover .tag{box-shadow:0 0 8px rgba(var(--accent-rgb),.25)}
.proj-title{font-family:var(--fd);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.7rem;line-height:1.2;transition:color var(--dur-mode) ease}
.proj-desc{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:1.2rem;transition:color var(--dur-mode) ease}

/* Plattform-Buttons (Web / Android / iOS) */
.plat-row{display:flex;flex-wrap:wrap;gap:.48rem;margin-bottom:1.5rem}
.plat-btn{
  display:inline-flex;align-items:center;gap:.42rem;font-size:11px;letter-spacing:.07em;
  text-transform:uppercase;padding:5px 13px;border-radius:6px;text-decoration:none;
  border:1px solid var(--bdr);color:var(--muted);background:rgba(255,255,255,.03);
  transition:border-color .25s,color .25s,box-shadow .25s,background .25s;
}
.plat-btn:hover{border-color:var(--bdr-hover);color:var(--accent);background:var(--accent-dim);box-shadow:var(--glow-sm)}
.plat-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}

.proj-footer{display:flex;justify-content:space-between;align-items:center;padding-top:1.25rem;border-top:1px solid var(--bdr);transition:border-color var(--dur-mode) ease}
.proj-year{font-size:11px;color:var(--subtle);transition:color var(--dur-mode) ease}
.proj-arrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:.5rem;transition:gap .22s,text-shadow .22s}
.proj-card:hover .proj-arrow{gap:.88rem;text-shadow:var(--glow-sm)}

/* Code-Preview */
.code-preview{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:1.75rem;font-size:12px;line-height:1.9;align-self:center;color:var(--muted);backdrop-filter:blur(8px);transition:background var(--dur-mode) ease}
:root[data-mode="light"] .code-preview{background:rgba(0,0,0,.07);border-color:rgba(0,0,0,.07)}
.code-preview .kw{color:#C792EA}.code-preview .fn{color:var(--accent)}.code-preview .cm{color:var(--subtle)}
.empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--subtle);font-size:13px;border:1px dashed rgba(255,255,255,.08);border-radius:12px}

/* ════════════════════════════════════════════════════════════════════
   §CSS-8  SKILLS + FOOTER
   ════════════════════════════════════════════════════════════════════ */
.skills-strip{border-top:1px solid var(--bdr);padding:2.5rem;display:flex;flex-wrap:wrap;gap:1.75rem;align-items:center;max-width:1280px;margin:0 auto;position:relative;z-index:10;transition:border-color var(--dur-mode) ease}
.skills-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--subtle);white-space:nowrap;transition:color var(--dur-mode) ease}
.skill-pill{font-size:11px;color:var(--muted);padding:4px 14px;border:1px solid var(--bdr);border-radius:6px;background:rgba(255,255,255,.025);backdrop-filter:blur(6px);cursor:default;transition:border-color .22s,color .22s,box-shadow .22s,background .22s}
:root[data-mode="light"] .skill-pill{background:rgba(0,0,0,.035)}
.skill-pill:hover{border-color:rgba(var(--accent-rgb),.45);color:var(--accent);box-shadow:0 0 14px rgba(var(--accent-rgb),.22);background:var(--accent-dim)}

footer{border-top:1px solid var(--bdr);padding:2.5rem;display:flex;justify-content:space-between;align-items:center;color:var(--subtle);font-size:12px;position:relative;z-index:10;transition:border-color var(--dur-mode) ease,color var(--dur-mode) ease}
footer a{color:var(--accent);text-decoration:none;transition:text-shadow .22s}
footer a:hover{text-shadow:var(--glow-sm)}

/* ════════════════════════════════════════════════════════════════════
   §CSS-9  REVEAL + KEYFRAMES
   ════════════════════════════════════════════════════════════════════ */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .75s ease,transform .75s ease}
.reveal.visible{opacity:1;transform:none}

@keyframes fadeUp  {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes yyFallback{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ringPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.025)}}

/* ════════════════════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════════════════
   §JS-4  THEME / MODE / LANGUAGE  — mit localStorage-Persistenz
   ═══════════════════════════════════════════════════════════════════ */
let LANG = localStorage.getItem('pf_lang') || 'de';
let MODE = localStorage.getItem('pf_mode') || 'auto';
let COLOR= localStorage.getItem('pf_color')|| 'teal';

/* Gespeicherte Einstellungen sofort anwenden (verhindert Flackern) */
(function applyStored(){
  const r = document.documentElement;
  r.setAttribute('data-color', COLOR);
  r.setAttribute('data-mode',  MODE);
  const mBtn = document.getElementById('modeBtn');
  if(mBtn) mBtn.textContent = MODE === 'light' ? '☀' : '🌙';
})();

function setColor(c, btn) {
  COLOR = c;
  localStorage.setItem('pf_color', c);
  document.documentElement.setAttribute('data-color', c);
  document.querySelectorAll('.th-dot').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.th-dot[data-color="${c}"]`)?.classList.add('active');
}

function toggleMode() {
  const root = document.documentElement, btn = document.getElementById('modeBtn');
  MODE = (MODE === 'auto' || MODE === 'dark') ? 'light' : 'dark';
  root.setAttribute('data-mode', MODE);
  btn.textContent = MODE === 'light' ? '☀' : '🌙';
  localStorage.setItem('pf_mode', MODE);
}

function setLang(l) {
  LANG = l;
  localStorage.setItem('pf_lang', l);
  const t = T[l];
  document.documentElement.setAttribute('lang', l);
  document.documentElement.setAttribute('dir', t.dir);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));

  /* Hero-Titel */
  document.getElementById('heroTitle').innerHTML = t.hero_lines.map((ln, i) => {
    if (i === t.hero_dim)  return `<span class="dim">${ln}</span>`;
    if (i === t.hero_glow) return `<span class="hi">${ln}</span>`;
    return `<span>${ln}</span>`;
  }).join('<br>');

  /* data-i Attribute */
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.dataset.i; if (t[k] !== undefined) el.textContent = t[k];
  });

  renderGrid();
}

/* ═══════════════════════════════════════════════════════════════════
   §JS-6  YIN-YANG  ORGANISCHE ANIMATION
   ═══════════════════════════════════════════════════════════════════
   Drei überlagerte Mechanismen erzeugen den organischen Effekt:

   A) SPIN   — Sinusförmige Geschwindigkeitsvariation (±15 %)
               → nie gleichmäßig-mechanisch, immer lebendig

   B) TILT   — Langsame 3D-Neigung (rotateX + rotateZ)
               → flache Scheibe bekommt Tiefe und Volumen

   C) ORBIT  — Das ganze Element bewegt sich auf einer Ellipse
               → subtiles kosmisches Schweben

   D) MAUS   — Mausgeschwindigkeit beschleunigt kurz den Spin

   WARUM DER PUNKT-EFFEKT ENTSTEHT:
     Dunkler Punkt (cy=+74) dreht im Uhrzeigersinn:
       0°  → unten       (6 Uhr)
       90° → rechts      (3 Uhr)
      180° → oben        (12 Uhr)
      270° → LINKS       ← hier BEWEGT ER SICH NACH OBEN ↑
     Heller Punkt (cy=-74) ist immer gegenüber:
      270° → rechts      ← hier BEWEGT ER SICH NACH UNTEN ↓
   ═══════════════════════════════════════════════════════════════════ */
(function yyInit() {
  const svg  = document.getElementById('yySvg');
  const arm  = document.getElementById('yyArm');
  const part = document.getElementById('yyPart');
  if (!svg || !arm) return;

  svg.classList.add('js'); // CSS-Fallback abschalten

  /* ── A) Spin ──────────────────────────────────────── */
  /* ✏ ANPASSEN: YY_SEC = Sekunden pro Umdrehung */
  const YY_SEC   = 18;
  const BASE_SPD = 360 / (YY_SEC * 60); // °/Frame @ 60fps
  let   angle    = 0;

  /* ── B) Tilt-Amplituden (Grad) ─────────────────────── */
  /* ✏ ANPASSEN: Größere Werte = stärkere Neigung */
  const TX = 9, TZ = 4;

  /* ── C) Orbit ─────────────────────────────────────── */
  /* ✏ ANPASSEN: RX/RY = Orbit-Radien in px */
  const RX = 55, RY = 42, OSPD = 0.20;
  let   oa = 0, scrollOy = 0;

  /* ── D) Maus ──────────────────────────────────────── */
  let mvel=0, lx=0, ly=0;
  document.addEventListener('mousemove', e=>{
    mvel = Math.min(Math.hypot(e.clientX-lx, e.clientY-ly), 80)/80;
    lx=e.clientX; ly=e.clientY;
  });

  /* Partikel */
  for (let i=0; i<16; i++) {
    const p = document.createElement('div');
    p.className = 'yy-p';
    const sz  = (Math.random()*2.8+.8).toFixed(1)+'px';
    const r   = (128+Math.random()*72).toFixed(0)+'px';
    const dur = (15+Math.random()*22).toFixed(1)+'s';
    const del = (-Math.random()*22).toFixed(1)+'s';
    p.style.cssText=`width:${sz};height:${sz};left:50%;top:50%;margin-left:calc(${sz}/-2);margin-top:calc(${sz}/-2);opacity:${(.18+Math.random()*.55).toFixed(2)};--r:${r};animation-duration:${dur};animation-delay:${del};${Math.random()>.5?'animation-direction:reverse;':''}`;
    part.appendChild(p);
  }

  window.addEventListener('scroll', ()=>{ scrollOy = scrollY * 0.18; });

  /* Render-Loop */
  let lastTs = 0;
  function frame(ts) {
    const dt = Math.min(ts-lastTs, 50); lastTs = ts;

    /* Maus-Boost abklingen */
    mvel *= 0.88;

    /* A) Spin: Basis + Sinus-Variation + Maus-Boost */
    const speedMod = 1 + 0.15 * Math.sin(ts/4200);
    const boost    = 1 + mvel * 3.2;
    angle += BASE_SPD * speedMod * boost * (dt/16.67);

    /* B) 3D-Tilt */
    const tx = TX * Math.sin(ts/5000);
    const tz = TZ * Math.sin(ts/7200 + 1.3);

    /* Atem-Skalierung */
    const sc = 1 + 0.018 * Math.sin(ts/3400);

    /* SVG-Transform */
    svg.style.transform =
      `perspective(900px) rotate(${angle}deg) rotateX(${tx}deg) rotateZ(${tz}deg) scale(${sc})`;

    /* C) Orbit */
    oa += OSPD * (dt/16.67);
    const rad = oa * Math.PI/180;
    const ox = Math.cos(rad)*RX;
    const oy = Math.sin(rad)*RY + scrollOy;
    arm.style.transform = `translate(${ox}px, calc(-50% + ${oy}px))`;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* ═══════════════════════════════════════════════════════════════════
   §JS-7  GALAXY STARFIELD
   Drei Ebenen: Sterne (twinkeln) · Nebel-Partikel · Sternschnuppen
   ═══════════════════════════════════════════════════════════════════ */
(function initStars() {
  const cv=document.getElementById('starfield'), ctx=cv.getContext('2d');
  let W,H,stars=[],nebs=[],shoots=[];

  const isLight=()=>{
    const m=document.documentElement.getAttribute('data-mode');
    return m==='light'||(m==='auto'&&matchMedia('(prefers-color-scheme:light)').matches);
  };

  function build(){
    stars=[]; nebs=[];
    const n=Math.floor(W*H/2800);
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.2,a:Math.random(),spd:.04+Math.random()*.1,tw:Math.random()*Math.PI*2,dy:Math.random()*.12});
    const cols=['rgba(22,160,133,','rgba(60,120,255,','rgba(180,40,255,','rgba(0,200,160,'];
    for(let i=0;i<8;i++) nebs.push({x:Math.random()*W,y:Math.random()*H,r:65+Math.random()*120,col:cols[i%cols.length],a:.04+Math.random()*.07,dx:(Math.random()-.5)*.18,dy:(Math.random()-.5)*.12});
  }

  let f=0;
  function draw(){
    ctx.clearRect(0,0,W,H); f++;
    const lt=isLight();
    if(!lt){
      nebs.forEach(n=>{
        const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
        g.addColorStop(0,n.col+n.a+')'); g.addColorStop(1,n.col+'0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
        n.x+=n.dx; n.y+=n.dy;
        if(n.x<-n.r)n.x=W+n.r; if(n.x>W+n.r)n.x=-n.r;
        if(n.y<-n.r)n.y=H+n.r; if(n.y>H+n.r)n.y=-n.r;
      });
    }
    stars.forEach(s=>{
      const tw=.5+.5*Math.sin(f*s.spd+s.tw);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=lt?`rgba(30,50,100,${s.a*tw*.38})`:`rgba(255,255,255,${s.a*tw})`;
      ctx.fill();
      s.y-=s.dy*.1; if(s.y<-2)s.y=H+2;
    });
    if(!lt&&Math.random()<.004) shoots.push({x:Math.random()*W,y:Math.random()*H*.5,len:80+Math.random()*120,spd:6+Math.random()*8,life:1,ang:Math.PI/5+Math.random()*.28});
    shoots=shoots.filter(s=>s.life>0);
    shoots.forEach(s=>{
      const ex=s.x+Math.cos(s.ang)*s.len*s.life,ey=s.y+Math.sin(s.ang)*s.len*s.life;
      const g=ctx.createLinearGradient(s.x,s.y,ex,ey);
      g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(1,`rgba(255,255,255,${s.life*.8})`);
      ctx.strokeStyle=g; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(ex,ey); ctx.stroke();
      s.x+=Math.cos(s.ang)*s.spd; s.y+=Math.sin(s.ang)*s.spd; s.life-=.018;
    });
    requestAnimationFrame(draw);
  }
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;build();}
  resize(); draw();
  window.addEventListener('resize',resize);
})();

/* ═══════════════════════════════════════════════════════════════════
   §JS-8  CUSTOM CURSOR — Leuchtpur + Ripple + flexible Reaktion
   ═══════════════════════════════════════════════════════════════════ */
(function(){
  const dot  = document.getElementById('cdot');
  const ring = document.getElementById('cring');
  if(!dot) return;

  /* ── Trail-Punkte erzeugen ── */
  const TRAIL_N = 9;
  const trail   = [];
  for(let i = 0; i < TRAIL_N; i++){
    const t = document.createElement('div');
    t.className = 'cursor-trail';
    const frac = (i + 1) / TRAIL_N;          /* 0.11 … 1 */
    t.style.cssText = `
      width:${(5 - frac * 2.8).toFixed(1)}px;
      height:${(5 - frac * 2.8).toFixed(1)}px;
      opacity:${(0.55 - frac * 0.48).toFixed(2)};
    `;
    document.body.appendChild(t);
    trail.push({ el: t, x: -100, y: -100 });
  }

  /* ── Zustand ── */
  let mx = -200, my = -200;
  let rx = -200, ry = -200;
  /* Trail-Positionen als Ringpuffer */
  const hist = Array.from({length: TRAIL_N * 3 + 4}, () => ({x:-200,y:-200}));
  let hIdx = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top  = my + 'px';
    /* Aktuelle Position in Verlauf schreiben */
    hist[hIdx % hist.length] = {x: mx, y: my};
    hIdx++;
  });

  /* ── Klick-Ripple ── */
  document.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'cursor-ripple';
    r.style.left   = e.clientX + 'px';
    r.style.top    = e.clientY + 'px';
    r.style.width  = '40px';
    r.style.height = '40px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });

  /* ── Interaktive Elemente ── */
  document.querySelectorAll('a,button,.proj-card,.skill-pill,.th-dot,.lang-btn,.plat-btn').forEach(el => {
    el.addEventListener('mouseenter', () => {
      dot.style.width  = '16px';
      dot.style.height = '16px';
      ring.style.width  = '58px';
      ring.style.height = '58px';
      ring.style.borderColor = `rgba(var(--accent-rgb),.95)`;
    });
    el.addEventListener('mouseleave', () => {
      dot.style.width  = '10px';
      dot.style.height = '10px';
      ring.style.width  = '40px';
      ring.style.height = '40px';
      ring.style.borderColor = `rgba(var(--accent-rgb),.72)`;
    });
  });

  /* ── Render-Loop ── */
  (function loop(){
    /* Ring folgt mit sanftem Lerp */
    rx = lerp(rx, mx, 0.15);
    ry = lerp(ry, my, 0.15);
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';

    /* Trail-Punkte aus Verlauf-Puffer */
    for(let i = 0; i < TRAIL_N; i++){
      const age = (i + 1) * 3;            /* je weiter hinten, desto älter */
      const idx = ((hIdx - age) % hist.length + hist.length) % hist.length;
      const pos = hist[idx];
      trail[i].el.style.left = pos.x + 'px';
      trail[i].el.style.top  = pos.y + 'px';
    }

    requestAnimationFrame(loop);
  })();
})();

/* ═══════════════════════════════════════════════════════════════════
   §JS-9  SCROLL  —  Progress + Parallax-Gitter
   ═══════════════════════════════════════════════════════════════════ */
window.addEventListener('scroll',()=>{
  document.getElementById('scroll-prog').style.width=(scrollY/(document.body.scrollHeight-innerHeight)*100)+'%';
  const g=document.getElementById('plGrid');
  if(g)g.style.transform=`translateY(${scrollY*.26}px)`;
});

/* ═══════════════════════════════════════════════════════════════════
   §JS-10  CARD MOUSE-SPOTLIGHT
   ═══════════════════════════════════════════════════════════════════ */
document.addEventListener('mousemove',e=>{
  document.querySelectorAll('.proj-card').forEach(card=>{
    const r=card.getBoundingClientRect();
    card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
    card.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
  });
});

/* ═══════════════════════════════════════════════════════════════════
   §JS-11  SCROLL REVEAL
   ═══════════════════════════════════════════════════════════════════ */
const obs=new IntersectionObserver(en=>en.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:.14});
function obAll(){document.querySelectorAll('.reveal:not(.visible)').forEach(el=>obs.observe(el));}
setInterval(obAll,600);

/* ═══════════════════════════════════════════════════════════════════
   §JS-12  INIT
   ═══════════════════════════════════════════════════════════════════ */
document.getElementById('modeBtn').textContent =
  matchMedia('(prefers-color-scheme:dark)').matches ? '🌙' : '☀';
