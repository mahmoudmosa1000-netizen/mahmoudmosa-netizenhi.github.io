<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Heart when u around</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: linear-gradient(180deg, #000000 0%, #100500 50%, #1f0a00 100%);
  width: 100vw; height: 100vh;
}
#container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
.glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; mix-blend-mode: screen; opacity: 0.75;
  background: radial-gradient(circle at 50% 50%, rgba(255,100,0,0.05) 0%, rgba(200,50,0,0.05) 50%, transparent 65%);
}
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div class="glow"></div>
    <script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, particles, composer, controls;
let time = 0;
const particleCount = 10000;
const moltenColors = [
  new THREE.Color(0xff4800), new THREE.Color(0xff8c00),
  new THREE.Color(0xd73a00), new THREE.Color(0x3d1005), new THREE.Color(0xffc600)
];

function createHeartPath(i, total) {
  const t = (i / total) * Math.PI * 2, s = 2.2, j = 0.2;
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  return new THREE.Vector3(
    x*s + (Math.random()-.5)*j, y*s + (Math.random()-.5)*j,
    Math.sin(t*4)*2 + (Math.random()-.5)*j*.5
  );
}

function getAttributesForParticle(i) {
  const t = i / particleCount;
  const cp = (t * moltenColors.length * 1.5 + time * 0.05) % moltenColors.length;
  const idx1 = Math.floor(cp), idx2 = (idx1+1) % moltenColors.length;
  const base = new THREE.Color().lerpColors(moltenColors[idx1], moltenColors[idx2], cp - idx1);
  return { color: base.clone().multiplyScalar(.65 + Math.random()*.55), size: .65 + Math.random()*.6 };
}

function createParticleTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d'), cx=32, cy=32, oR=28.8, iR=12.8;
  ctx.beginPath(); ctx.moveTo(cx, cy-oR);
  for (let i=0; i<5; i++) {
    const oa = (i/5)*Math.PI*2 - Math.PI/2;
    ctx.lineTo(cx+oR*Math.cos(oa), cy+oR*Math.sin(oa));
    const ia = oa + Math.PI/5;
    ctx.lineTo(cx+iR*Math.cos(ia), cy+iR*Math.sin(ia));
  }
  ctx.closePath();
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,oR);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(.3,'rgba(255,255,220,.9)');
  g.addColorStop(.6,'rgba(255,200,150,.6)'); g.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle = g; ctx.fill();
  const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true; return tex;
}

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1500);
camera.position.z = 90;
renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('container').appendChild(renderer.domElement);

controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.rotateSpeed = 0.3; controls.minDistance = 30;
controls.maxDistance = 300; controls.enablePan = false;

composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.35, 0.45, 0.7));
composer.addPass(new OutputPass());

const geo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount*3), colors = new Float32Array(particleCount*3);
const sizes = new Float32Array(particleCount), heartPositions = new Float32Array(particleCount*3);
const offsets = new Float32Array(particleCount*3);

for (let i=0; i<particleCount; i++) {
  const i3 = i*3, pos = createHeartPath(i, particleCount);
  positions[i3]=heartPositions[i3]=pos.x; positions[i3+1]=heartPositions[i3+1]=pos.y; positions[i3+2]=heartPositions[i3+2]=pos.z;
  const {color, size} = getAttributesForParticle(i);
  colors[i3]=color.r; colors[i3+1]=color.g; colors[i3+2]=color.b; sizes[i]=size;
  const str=30+Math.random()*40, phi=Math.random()*Math.PI*2, theta=Math.acos(2*Math.random()-1);
  offsets[i3]=Math.sin(theta)*Math.cos(phi)*str; offsets[i3+1]=Math.sin(theta)*Math.sin(phi)*str; offsets[i3+2]=Math.cos(theta)*str*.5;
}

geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes,1));
geo.setAttribute('heartPosition', new THREE.BufferAttribute(heartPositions,3));
geo.setAttribute('disintegrationOffset', new THREE.BufferAttribute(offsets,3));

particles = new THREE.Points(geo, new THREE.PointsMaterial({
  size:2.8, map:createParticleTexture(), vertexColors:true, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true, alphaTest:0.01
}));
scene.add(particles);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});

function animateParticles() {
  const pos=particles.geometry.attributes.position.array, home=particles.geometry.attributes.heartPosition.array;
  const cols=particles.geometry.attributes.color.array, szs=particles.geometry.attributes.size.array;
  const off=particles.geometry.attributes.disintegrationOffset.array;
  for (let i=0; i<particleCount; i++) {
    const i3=i*3, cycleTime=20, cycleOffset=(i/particleCount)*cycleTime*.5;
    const cp=((time*.6+cycleOffset)%cycleTime)/cycleTime;
    let da=0; const p0=.5,p1=.65,p2=.75;
    if(cp<p0) da=0; else if(cp<p1) da=(cp-p0)/(p1-p0); else if(cp<p2) da=1; else da=1-(cp-p2)/(1-p2);
    da=Math.sin(da*Math.PI*.5);
    let tx=home[i3],ty=home[i3+1],tz=home[i3+2],lf=.085;
    if(da>.001){tx=home[i3]+off[i3]*da;ty=home[i3+1]+off[i3+1]*da;tz=home[i3+2]+off[i3+2]*da;lf=.045+da*.02;}
    pos[i3]+=(tx-pos[i3])*lf; pos[i3+1]+=(ty-pos[i3+1])*lf; pos[i3+2]+=(tz-pos[i3+2])*lf;
    const {color,size}=getAttributesForParticle(i);
    let b=(.65+Math.sin((i/particleCount)*Math.PI*7+time*1.3)*.35)*(1-da*.75);
    b*=.85+Math.sin(time*7+i*.5)*.15;
    cols[i3]=color.r*b; cols[i3+1]=color.g*b; cols[i3+2]=color.b*b;
    let sz=size*(1-da*.9); sz*=.8+Math.sin(time*5+i*.3)*.2; szs[i]=Math.max(.05,sz);
  }
  particles.geometry.attributes.position.needsUpdate=true;
  particles.geometry.attributes.color.needsUpdate=true;
  particles.geometry.attributes.size.needsUpdate=true;
}

(function animate(){requestAnimationFrame(animate);time+=.02;controls.update();animateParticles();composer.render();})();
    </script>
  </body>
</html>
